name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run tests
        run: >
          python -m pytest tests/ -v
          --alluredir=allure-results
          --json-report --json-report-file=pytest-report.json

      - name: Set up Java (required by Allure CLI)
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Allure commandline
        if: always()
        run: |
          curl -sL -o allure.zip https://github.com/allure-framework/allure2/releases/download/2.39.0/allure-2.39.0.zip
          unzip -qq allure.zip -d /opt/
          echo "/opt/allure-2.39.0/bin" >> $GITHUB_PATH

      - name: Generate Allure HTML report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Generate common results.json
        if: always()
        run: python scripts/generate_results_summary.py

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Upload results.json artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-json
          path: results.json
          retention-days: 30